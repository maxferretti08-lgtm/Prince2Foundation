<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#242836;--bd:#2e3345;--tx:#e4e7f0;--tx2:#9099b0;--ac:#6366f1;--ac2:#818cf8;--gn:#22c55e;--gnb:rgba(34,197,94,.12);--rd:#ef4444;--rdb:rgba(239,68,68,.12);--yl:#eab308;--ylb:rgba(234,179,8,.12);--bl:#3b82f6;--blb:rgba(59,130,246,.12);--r:12px;--sw:270px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
.main{flex:1;margin-left:var(--sw);min-height:100vh}
.hdr{position:sticky;top:0;z-index:50;background:rgba(15,17,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:15px;font-weight:700;white-space:nowrap}
.hdr h1 em{color:var(--ac2);font-style:normal}
.pw{flex:1;display:flex;align-items:center;gap:8px}
.pb{flex:1;height:5px;background:var(--sf2);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:3px;transition:width .4s}
.ptx{font-size:12px;color:var(--tx2);font-weight:500;white-space:nowrap}
.bm{display:none;background:none;color:var(--tx);font-size:20px;padding:4px 8px}
.shd{padding:14px 12px 8px;border-bottom:1px solid var(--bd)}
.shd h2{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.sbx{padding:6px 10px}
.sn{flex:1;overflow-y:auto;padding:4px 6px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--tx2);transition:all .15s;user-select:none}
.ni:hover{background:var(--sf2);color:var(--tx)}
.ni.on{background:var(--ac);color:#fff}
.ni .ct{margin-left:auto;font-size:11px;font-weight:600;background:var(--sf2);padding:2px 7px;border-radius:10px;min-width:24px;text-align:center}
.ni.on .ct{background:rgba(255,255,255,.2);color:#fff}
.nd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sfl{padding:10px 12px;border-top:1px solid var(--bd)}
.sfl h3{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.fb{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:5px;font-size:12px;color:var(--tx2);background:none;margin-bottom:1px;transition:all .15s}
.fb:hover{background:var(--sf2);color:var(--tx)}
.fb.on{background:var(--ac);color:#fff}
.sac{padding:10px 12px;border-top:1px solid var(--bd)}
.bex{display:block;width:100%;padding:10px;border-radius:7px;font-size:13px;font-weight:600;background:linear-gradient(135deg,var(--ac),#8b5cf6);color:#fff;text-align:center;transition:transform .15s,box-shadow .15s}
.bex:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.3)}
.cnt{padding:20px;max-width:840px;margin:0 auto}
.qc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.qhd{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.qnm{font-size:12px;font-weight:600;color:var(--ac2)}
.qar{font-size:11px;font-weight:500;padding:3px 8px;border-radius:16px;background:var(--sf2);color:var(--tx2)}
.qbd{padding:18px}
.qtx{font-size:15px;line-height:1.6;margin-bottom:16px;font-weight:500}
.qst{margin-bottom:14px;padding:10px 14px;background:var(--sf2);border-radius:7px}
.qst p{font-size:13px;line-height:1.6;margin-bottom:3px}
.qop{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:7px;background:var(--sf2);border:2px solid transparent;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.5}
.opt:hover{border-color:var(--ac)}
.opt.sel{border-color:var(--ac);background:rgba(99,102,241,.1)}
.opt.ok{border-color:var(--gn);background:var(--gnb)}
.opt.no{border-color:var(--rd);background:var(--rdb)}
.olt{flex-shrink:0;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--bd);color:var(--tx)}
.opt.ok .olt{background:var(--gn);color:#fff}
.opt.no .olt{background:var(--rd);color:#fff}
.otx{flex:1}
.qsr{margin-top:10px}
.qsr summary{font-size:11px;color:var(--tx2);cursor:pointer;font-weight:500}
.qsrl{padding:6px 0 0 6px;font-size:11px;color:var(--tx2);font-family:'JetBrains Mono',monospace}
.qsrl div{margin-bottom:1px}
.qrv{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--bd)}
.qrv.vis{display:block}
.qaw{margin-top:10px;font-size:14px;font-weight:600;color:var(--gn)}
.lbg{font-size:10px;padding:2px 5px;border-radius:3px;background:var(--blb);color:var(--bl);font-weight:600;margin-left:6px}
.cbg{font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(139,92,246,.15);color:#a78bfa;font-weight:600}
.qact{padding:14px 18px;border-top:1px solid var(--bd);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.bt{padding:7px 14px;border-radius:5px;font-size:12px;font-weight:600;transition:all .15s}
.brev{background:var(--ac);color:#fff}
.brev:hover{background:var(--ac2)}
.bfl{background:var(--sf2);color:var(--yl);border:1px solid var(--bd)}
.bfl.fg{background:var(--ylb);border-color:var(--yl)}
.bnv{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}
.bnv:hover{background:var(--bd)}
.brst{background:var(--sf2);color:var(--rd);border:1px solid var(--bd);font-size:11px;padding:5px 10px}
.brst:hover{background:var(--rdb)}
.spc{flex:1}
.sgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.scd{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}
.svl{font-size:26px;font-weight:700;color:var(--ac2)}
.slb{font-size:12px;color:var(--tx2);margin-top:3px}
.itb{width:100%;border-collapse:collapse;font-size:12px}
.itb th{text-align:left;padding:7px 10px;background:var(--sf2);color:var(--tx2);font-weight:600;position:sticky;top:52px}
.itb td{padding:7px 10px;border-bottom:1px solid var(--bd)}
.itb tr:hover td{background:var(--sf2)}
.itb tr{cursor:pointer}
.exb{position:sticky;top:52px;z-index:40;background:rgba(15,17,23,.95);backdrop-filter:blur(12px);padding:8px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd)}
.etm{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--yl)}
.esc{font-size:13px;color:var(--tx2)}
.eres{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin:16px 0}
.eres h2{font-size:20px;margin-bottom:14px}
.epas{color:var(--gn)}.efai{color:var(--rd)}
.sinp{width:100%;padding:7px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:12px;outline:none}
.sinp:focus{border-color:var(--ac)}
.sinp::placeholder{color:var(--tx2)}
.ovrl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.ovrl.vis{display:block}
.etog{font-size:11px;color:var(--bl);cursor:pointer;margin-top:4px;background:none;padding:0;text-decoration:underline}
.engbox{display:none;margin-top:8px;padding:10px;background:var(--sf2);border-radius:6px;font-size:12px;color:var(--tx2);line-height:1.5}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);width:270px}
.sidebar.op{transform:translateX(0)}
.main{margin-left:0}
.bm{display:block}
.hdr h1{font-size:13px}
.cnt{padding:14px}
.qbd{padding:14px}
.qhd{padding:10px 14px}
.qact{padding:10px 14px}
}
</style>
</head>

</div>

var lb=q.lang==='ENG'?'<span class="lbg">ENG\u2192ITA</span>':'';
var cb=q.combo?' <span class="cbg">COMBO</span>':'';

var engToggle='';
if(q.engText){
engToggle='<button class="etog" onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'block\'?\'none\':\'block\'">Mostra/nascondi originale inglese</button><div class="engbox"><strong>Original:</strong> '+esc(q.engText)+'</div>';
}

var h='<div class="qc">';
h+='<div class="qhd"><span class="qnm">'+(S.ci+1)+'/'+S.fq.length+' \u2014 #'+q.id+cb+lb+'</span><span class="qar">'+q.area+'</span></div>';
h+='<div class="qbd"><div class="qtx">'+esc(q.text)+'</div>'+engToggle+st+'<div class="qop">'+op+'</div>'+sr;
h+='<div class="qrv" id="rv"><div class="qaw">\u2705 Risposta: '+q.ans+') '+esc(q.ansT)+'</div></div>';
h+='</div>';
h+='<div class="qact">';
h+='<button class="bt brev" onclick="toggleRev()" id="brv">'+(aw?'Nascondi':'Mostra risposta')+'</button>';
h+='<button class="bt bfl '+(fg?'fg':'')+'" data-qid="'+q.id+'" onclick="toggleFlag(this)">'+(fg?'\u26a0\ufe0f Segnalata':'\u26a0\ufe0f Segna')+'</button>';
h+='<button class="brst" data-qid="'+q.id+'" onclick="resetOne(this)" title="Reset questa domanda">\u21ba</button>';
h+='<span class="spc"></span>';
h+='<button class="bt bnv" onclick="navQ(-1)"'+(S.ci===0?' disabled':'')+'>\u2190</button>';
h+='<button class="bt bnv" onclick="navQ(1)"'+(S.ci>=S.fq.length-1?' disabled':'')+'>\u2192</button>';
h+='</div></div>';
c.innerHTML=h;
if(aw)document.getElementById('rv').classList.add('vis');
}

function pickAns(el){
var id=parseInt(el.dataset.qid),l=el.dataset.let;
if(S.an[id])return;
S.an[id]=l;sv();rq();
}
function toggleRev(){var r=document.getElementById('rv');r.classList.toggle('vis');document.getElementById('brv').textContent=r.classList.contains('vis')?'Nascondi':'Mostra risposta'}
function toggleFlag(el){var id=parseInt(el.dataset.qid);if(S.fl.has(id))S.fl.delete(id);else S.fl.add(id);sv();rq()}
function navQ(d){S.ci=Math.max(0,Math.min(S.fq.length-1,S.ci+d));rq();scrollTo(0,0)}
function resetOne(el){var id=parseInt(el.dataset.qid);if(S.an[id])delete S.an[id];sv();rq()}
function resetAll(){if(!confirm('Reset TUTTE le risposte?\nLe segnalazioni verranno mantenute.'))return;S.an={};S.sn=new Set();sv();up();rq()}

function showStats(){
var c=document.getElementById('cnt'),t=Q.length,sn=S.sn.size,fl=S.fl.size,aw=Object.keys(S.an).length;
var co=0;for(var k in S.an){var q=Q.find(function(x){return x.id==k});if(q&&q.ans===S.an[k])co++}
var p=aw>0?Math.round(co/aw*100):0;
var cm=Q.filter(function(x){return x.combo}).length;
var en=Q.filter(function(x){return x.lang==='ENG'}).length;
var as='';
for(var j=0;j<AREAS.length;j++){
var a=AREAS[j];if(a.c==='00')continue;
var aq=Q.filter(function(x){return gc(x.area)===a.c});
var an2=aq.filter(function(x){return S.an[x.id]}).length;
var ac=aq.filter(function(x){return S.an[x.id]===x.ans}).length;
var af=aq.filter(function(x){return S.fl.has(x.id)}).length;
var pc=an2>0?Math.round(ac/an2*100):0;
as+='<div class="scd" style="text-align:left;cursor:pointer" onclick="setArea(\''+a.c+'\')"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span class="nd" style="background:'+a.cl+'"></span><span style="font-size:12px;font-weight:600">'+a.n+'</span></div><div style="font-size:11px;color:var(--tx2)">'+aq.length+' dom \u00b7 '+af+' segn</div><div style="font-size:11px;color:'+(pc>=65?'var(--gn)':'var(--rd)')+'">'+an2+' risposte ('+pc+'%)</div></div>';
}
c.innerHTML='<h2 style="font-size:20px;margin-bottom:16px">\ud83d\udcca Statistiche</h2><div class="sgr"><div class="scd"><div class="svl">'+t+'</div><div class="slb">Totali</div></div><div class="scd"><div class="svl">'+sn+'</div><div class="slb">Viste</div></div><div class="scd"><div class="svl">'+fl+'</div><div class="slb">Segnalate</div></div><div class="scd"><div class="svl" style="color:'+(p>=65?'var(--gn)':'var(--rd)')+'">'+p+'%</div><div class="slb">Corrette ('+co+'/'+aw+')</div></div><div class="scd"><div class="svl">'+cm+'</div><div class="slb">Combo</div></div><div class="scd"><div class="svl">'+en+'</div><div class="slb">Da ENG</div></div></div><h3 style="font-size:15px;margin-bottom:10px">Per area</h3><div class="sgr">'+as+'</div><div style="margin-top:16px;text-align:center"><button class="brst" onclick="resetAll()">\ud83d\udd04 Reset tutto</button></div>';
}

function showIndex(){
var c=document.getElementById('cnt');fq();var qs=S.fq;var r='';
for(var i=0;i<qs.length;i++){
var q=qs[i];
var f=S.fl.has(q.id)?'\u26a0\ufe0f':'';
var cb=q.combo?'<span class="cbg">COMBO</span>':'';
var a=S.an[q.id],ok=a===q.ans,st=a?(ok?'\u2705':'\u274c'):'\u2014';
r+='<tr onclick="goQ('+i+')"><td>'+q.id+'</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+q.area.substring(5)+'</td><td style="max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(q.text)+'</td><td>'+cb+'</td><td>'+f+'</td><td>'+st+'</td></tr>';
}
c.innerHTML='<h2 style="font-size:20px;margin-bottom:10px">\ud83d\udccb Indice <span style="font-size:13px;color:var(--tx2)">('+qs.length+')</span></h2><div style="overflow-x:auto"><table class="itb"><thead><tr><th>#</th><th>Area</th><th>Domanda</th><th></th><th></th><th></th></tr></thead><tbody>'+r+'</tbody></table></div>';
}
function goQ(i){S.ci=i;rq();scrollTo(0,0)}

function startExam(){
if(!confirm('Simulazione: 60 domande, 60 minuti, soglia 65%.'))return;
var sh=Q.slice().sort(function(){return Math.random()-.5});
S.eq=sh.slice(0,60);S.em=true;S.ea={};S.ci=0;S.es=Date.now();
document.getElementById('exbar').style.display='flex';
startTimer();rqe();if(innerWidth<769)toggleSB();
}
function startTimer(){
clearInterval(S.et);
S.et=setInterval(function(){
var el=Math.floor((Date.now()-S.es)/1000),rm=Math.max(0,3600-el);
var m=Math.floor(rm/60),s=rm%60;
document.getElementById('etimer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
document.getElementById('escore').textContent=Object.keys(S.ea).length+'/60';
if(rm<=0)endExam();
},1000);
}

function rqe(){
if(!S.em)return;var c=document.getElementById('cnt'),q=S.eq[S.ci];if(!q)return;var aw=S.ea[q.id];
var st='';
if(q.combo&&q.stmts&&q.stmts.length>0){st='<div class="qst">';for(var i=0;i<q.stmts.length;i++){st+='<p><strong>'+(i+1)+'.</strong> '+esc(q.stmts[i])+'</p>'}st+='</div>'}
var op='',L=['A','B','C','D'];
for(var i=0;i<q.opts.length;i++){var cl='opt';if(aw===L[i])cl+=' sel';op+='<div class="'+cl+'" data-qid="'+q.id+'" data-let="'+L[i]+'" onclick="examPick(this)"><span class="olt">'+L[i]+'</span><span class="otx">'+esc(q.opts[i])+'</span></div>'}
var dots='';
for(var i=0;i<S.eq.length;i++){
var ea=S.ea[S.eq[i].id],cur=i===S.ci;
var bg=ea?'var(--ac)':'var(--sf2)';
var bd=cur?'2px solid var(--ac2)':'1px solid var(--bd)';
dots+='<button style="width:28px;height:28px;border-radius:5px;font-size:10px;background:'+bg+';color:#fff;border:'+bd+';cursor:pointer" onclick="S.ci='+i+';rqe()">'+(i+1)+'</button>';
}
var h='<div class="qc"><div class="qhd"><span class="qnm">Domanda '+(S.ci+1)+'/60</span><span class="qar">'+q.area+'</span></div><div class="qbd"><div class="qtx">'+esc(q.text)+'</div>'+st+'<div class="qop">'+op+'</div></div><div class="qact"><span class="spc"></span><button class="bt bnv" onclick="examNav(-1)"'+(S.ci===0?' disabled':'')+'>\u2190</button><button class="bt bnv" onclick="examNav(1)"'+(S.ci>=59?' disabled':'')+'>\u2192</button></div></div><div style="display:flex;gap:4px;justify-content:center;padding:8px 16px 16px;flex-wrap:wrap">'+dots+'</div>';
c.innerHTML=h;
}
function examPick(el){var id=parseInt(el.dataset.qid),l=el.dataset.let;S.ea[id]=l;rqe()}
function examNav(d){S.ci=Math.max(0,Math.min(59,S.ci+d));rqe();scrollTo(0,0)}
function endExam(){
clearInterval(S.et);S.em=false;document.getElementById('exbar').style.display='none';
var t=60,co=0;
for(var i=0;i<S.eq.length;i++){if(S.ea[S.eq[i].id]===S.eq[i].ans)co++}
var aw=Object.keys(S.ea).length,p=Math.round(co/t*100),ps=p>=65;
var el=Math.floor((Date.now()-S.es)/1000),m=Math.floor(el/60),s=el%60;
for(var k in S.ea){S.an[k]=S.ea[k];S.sn.add(parseInt(k))}sv();
var dr='';
for(var i=0;i<S.eq.length;i++){
var q=S.eq[i],a=S.ea[q.id]||'\u2014',ok=a===q.ans;
dr+='<tr><td>'+(i+1)+'</td><td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(q.text)+'</td><td>'+a+'</td><td>'+q.ans+'</td><td>'+(a==='\u2014'?'\u2b1c':(ok?'\u2705':'\u274c'))+'</td></tr>';
}
var c=document.getElementById('cnt');
c.innerHTML='<div class="eres"><h2 class="'+(ps?'epas':'efai')+'">'+p+'% \u2014 '+(ps?'SUPERATO \u2705':'NON SUPERATO \u274c')+'</h2><div class="sgr"><div class="scd"><div class="svl">'+co+'/'+t+'</div><div class="slb">Corrette</div></div><div class="scd"><div class="svl">'+p+'%</div><div class="slb">Percentuale</div></div><div class="scd"><div class="svl">'+m+'m '+s+'s</div><div class="slb">Tempo</div></div><div class="scd"><div class="svl">'+(t-aw)+'</div><div class="slb">Non risposte</div></div></div><h3 style="margin:16px 0 10px">Dettaglio</h3><div style="overflow-x:auto"><table class="itb"><thead><tr><th>#</th><th>Domanda</th><th>Tua</th><th>OK</th><th></th></tr></thead><tbody>'+dr+'</tbody></table></div></div>';
}

document.addEventListener('keydown',function(e){
if(S.em){
if(e.key==='ArrowRight')examNav(1);
else if(e.key==='ArrowLeft')examNav(-1);
else if('abcd'.indexOf(e.key.toLowerCase())>=0){var q=S.eq[S.ci];if(q)S.ea[q.id]=e.key.toUpperCase();rqe()}
return;
}
if(e.key==='ArrowRight')navQ(1);
else if(e.key==='ArrowLeft')navQ(-1);
else if(e.key===' '){e.preventDefault();toggleRev()}
else if(e.key==='f'){var q=S.fq[S.ci];if(q){if(S.fl.has(q.id))S.fl.delete(q.id);else S.fl.add(q.id);sv();rq()}}
else if('abcd'.indexOf(e.key.toLowerCase())>=0){var q=S.fq[S.ci];if(q&&!S.an[q.id]){S.an[q.id]=e.key.toUpperCase();sv();rq()}}
});

function syncExport(){
var d={fl:[...S.fl],sn:[...S.sn],an:S.an};
var json=JSON.stringify(d);
var compressed=btoa(encodeURIComponent(json));
var url=location.origin+location.pathname+'#sync='+compressed;
document.getElementById('syncUrl').value=url;
document.getElementById('syncBox').style.display='block';
}
function copySync(){
var inp=document.getElementById('syncUrl');
inp.select();
navigator.clipboard.writeText(inp.value).then(function(){alert("Link copiato! Incollalo su WhatsApp o dove vuoi e aprilo dall'altro dispositivo.")}).catch(function(){
inp.select();document.execCommand('copy');alert('Link copiato!');
});
}
function syncImport(){
var hash=location.hash;
if(hash.indexOf('#sync=')!==0)return false;
try{
var compressed=hash.substring(6);
var json=decodeURIComponent(atob(compressed));
var d=JSON.parse(json);
if(!d.an)return false;
var mode=confirm('Dati ricevuti da un altro dispositivo.\n\nOK = Unisci con i dati attuali\nAnnulla = Sostituisci tutto');
if(mode){
if(d.fl)d.fl.forEach(function(x){S.fl.add(x)});
if(d.sn)d.sn.forEach(function(x){S.sn.add(x)});
if(d.an)for(var k in d.an){if(!S.an[k])S.an[k]=d.an[k]}
}else{
S.fl=new Set(d.fl||[]);S.sn=new Set(d.sn||[]);S.an=d.an||{};
}
sv();
history.replaceState(null,'',location.pathname);
alert('Sincronizzazione completata!\nSegnalate: '+S.fl.size+'\nViste: '+S.sn.size+'\nRisposte: '+Object.keys(S.an).length);
return true;
}catch(e){return false}
}
function exportData(){
var d={fl:[...S.fl],sn:[...S.sn],an:S.an,ts:new Date().toISOString()};
var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
var a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='prince2_progressi_'+new Date().toISOString().slice(0,10)+'.json';
a.click();
URL.revokeObjectURL(a.href);
}

function importData(input){
if(!input.files||!input.files[0])return;
var reader=new FileReader();
reader.onload=function(e){
try{
var d=JSON.parse(e.target.result);
if(!d.an){alert('File non valido.');return}
var mode=confirm('Vuoi UNIRE i dati importati con quelli attuali?\n\nOK = Unisci (mantiene entrambi)\nAnnulla = Sostituisci tutto');
if(mode){
// Merge
if(d.fl)d.fl.forEach(function(x){S.fl.add(x)});
if(d.sn)d.sn.forEach(function(x){S.sn.add(x)});
if(d.an)for(var k in d.an){if(!S.an[k])S.an[k]=d.an[k]}
}else{
// Replace
S.fl=new Set(d.fl||[]);
S.sn=new Set(d.sn||[]);
S.an=d.an||{};
}
sv();bs();fq();rq();up();
alert('Importazione completata!\nSegnalate: '+S.fl.size+'\nViste: '+S.sn.size+'\nRisposte: '+Object.keys(S.an).length);
}catch(err){alert('Errore nel file: '+err.message)}
};
reader.readAsText(input.files[0]);
input.value='';
}

syncImport();
bs();fq();rq();

</script>
</body>
</html>
